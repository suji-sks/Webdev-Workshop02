<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Information</title>
  <link rel="stylesheet" href="Experiment7.css">
</head>
<body>

  <div class="container">
    <h1>Student Information</h1>

    <div id="studentContainer"></div>
  </div>

  <script>
    // Student data (Props concept simulation)

    const students = [
      {
        name: "Rahul Sharma",
        course: "Computer Science",
        marks: 85
      },
      {
        name: "Anita Verma",
        course: "Information Technology",
        marks: 92
      },
      {
        name: "Rohan Gupta",
        course: "Electronics",
        marks: 78
      }
    ];

    const studentContainer = document.getElementById("studentContainer");

    // Function similar to React Component
    function Student(props) {
      return `
        <div class="student-card">
          <h2>${props.name}</h2>
          <p><strong>Course:</strong> ${props.course}</p>
          <p><strong>Marks:</strong> ${props.marks}</p>
        </div>
      `;
    }

    // Display all students
    students.forEach(student => {
      studentContainer.innerHTML += Student(student);
    });
  </script>
  <div class="footer">
    <p>Name : Sujal kumar sah
    <br>Roll No. : 2503215400196
    <br>Admn. no. : 2025b15410236 </p>
    </div>

</body>
</html>
