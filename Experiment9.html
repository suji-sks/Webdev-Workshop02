<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registration Form with API Fetch</title>
  <link rel="stylesheet" href="Experiment9.css">
</head>
<body>

  <div class="container">
    <h1>Registration Form</h1>

    <form id="registerForm">
      <input type="text" id="name" placeholder="Enter Name">
      <small class="error" id="nameError"></small>

      <input type="email" id="email" placeholder="Enter Email">
      <small class="error" id="emailError"></small>

      <input type="password" id="password" placeholder="Enter Password">
      <small class="error" id="passwordError"></small>

      <button type="submit">Register</button>
    </form>

    <h3 id="successMessage"></h3>

    <div class="users-box">
      <h2>Registered Users</h2>
      <ul id="userList"></ul>
    </div>
  </div>

  <script>
    const form = document.getElementById("registerForm");
    const successMessage = document.getElementById("successMessage");
    const userList = document.getElementById("userList");

 //Fetch API Data
    window.onload = fetchUsers;

    async function fetchUsers() {
      try {
        const response = await fetch("https://jsonplaceholder.typicode.com/users"); //Use Fetch API
        const data = await response.json(); //Convert Data into JSON

        userList.innerHTML = "";
    // Display Users Dynamically
        data.slice(0, 5).forEach(user => {
          const li = document.createElement("li");
          li.textContent = `${user.name} - ${user.email}`;
          userList.appendChild(li);
        });

      } catch (error) {
        console.log("Error fetching data");
      }
    }
    // Form Validation
    form.addEventListener("submit", function(e) {
      e.preventDefault();  // Prevent Page Reload

      let name = document.getElementById("name").value.trim();
      let email = document.getElementById("email").value.trim();
      let password = document.getElementById("password").value.trim();

      let valid = true;

     
      document.getElementById("nameError").textContent = "";
      document.getElementById("emailError").textContent = "";
      document.getElementById("passwordError").textContent = "";
      successMessage.textContent = "";

    //  Check Empty Fields
      if(name === "") {
        document.getElementById("nameError").textContent = "Name is required";
        valid = false;
      }


      if(email === "") {
        document.getElementById("emailError").textContent = "Email is required";
        valid = false;
      }

    //  Password Validation
      if(password.length < 6) {
        document.getElementById("passwordError").textContent =
          "Password must be at least 6 characters";
        valid = false;
      }

    // Success Message
      if(valid) {
        successMessage.textContent = "Registration Successful!";

        const li = document.createElement("li");
        li.textContent = `${name} - ${email}`;
        userList.appendChild(li);  // Add New User to List

        form.reset();
      }
    });
  </script>

    <br>Admn. no. : 2025b15410236 </p>
    </div>

</body>
</html>
