<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Counter Application</title>
  <link rel="stylesheet" href="Experiment8.css">
</head>
<body>

  <div class="container">
    <div class="counter-box">
      <h1>React Counter<br>Application</h1>

      <h2 id="count">0</h2>

      <div class="button-group">
        <button onclick="increment()">Increment (+)</button>
        <button onclick="decrement()">Decrement (-)</button>
      </div>

      <button class="reset-btn" onclick="resetCounter()">Reset</button>
    </div>
  </div>

  <script>
    // useState Hook concept simulation using JavaScript variable

    let count = 0;

    const countDisplay = document.getElementById("count");

    function updateUI() {
      countDisplay.textContent = count;
    }

    function increment() {
      count++;
      updateUI();
    }

    function decrement() {
      count--;
      updateUI();
    }

    function resetCounter() {
      count = 0;
      updateUI();
    }
  </script>

</body>
</html>
