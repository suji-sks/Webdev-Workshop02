<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>
    <link rel="stylesheet" href="Experiment4.css">
</head>
<body>

    <div class="calculator-card">
        <h1>Student Result Calculator</h1>
        
        <div class="input-section">
            <label for="subjectCount">Enter Number of Subjects</label>
            <input type="number" id="subjectCount" placeholder="e.g. 5">
            <button onclick="calculateResult()">Calculate Result</button>
        </div>

        <div id="resultDisplay" class="result-section">
            </div>
    </div>

    <script>
        function calculateResult() {
    const countInput = document.getElementById('subjectCount');
    const numSubjects = parseInt(countInput.value);
    const display = document.getElementById('resultDisplay');

    if (isNaN(numSubjects) || numSubjects <= 0) {
        alert("Please enter a valid number of subjects.");
        return;
    }

    let totalMarks = 0;
    let marksArray = [];

    
    for (let i = 1; i <= numSubjects; i++) {
        let mark = parseFloat(prompt(`Enter marks for Subject ${i}`));
        
        
        if (isNaN(mark)) {
            alert("Invalid input. Setting marks for this subject to 0.");
            mark = 0;
        }
        
        totalMarks += mark;
        marksArray.push(mark);
    }
    const average = totalMarks / numSubjects;
    let grade = "";
    let result = "PASS";

    if (average >= 90) grade = "A+";
    else if (average >= 75) grade = "A";
    else if (average >= 60) grade = "B";
    else if (average >= 50) grade = "C";
    else {
        grade = "F";
        result = "FAIL";
    }
    display.innerHTML = `
        <p>Total Marks: ${totalMarks}</p>
        <p>Average Marks: ${average.toFixed(2)}</p>
        <p>Grade: ${grade}</p>
        <p>Result: ${result}</p>
    `;
}
    </script>

</body>
</html>
